services:
  - type: web
    name: noveltor-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Render will prompt you to enter this in the dashboard

  - type: web
    name: noveltor-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE
        # After first deploy, update this to the actual backend URL shown in the dashboard
        # e.g. https://noveltor-backend.onrender.com
        value: https://noveltor-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
